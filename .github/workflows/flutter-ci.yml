name: Flutter CI

# Run on pushes and PRs targeting main
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel older runs of the same branch/PR when a new commit arrives
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Generate platform folders
        run: flutter create .

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting (informational)
        continue-on-error: true
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze project source
        # Errors and warnings fail the build; info-level lints (e.g. deprecation
        # hints, prefer_const) are reported but non-fatal to stay SDK-flexible.
        run: flutter analyze --no-fatal-infos

      - name: Run tests (if any exist)
        run: |
          if ls test/*_test.dart >/dev/null 2>&1; then
            flutter test
          else
            echo "No test files found, skipping."
          fi

  build-android:
    name: Build Android APK
    needs: analyze
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Generate platform folders
        run: flutter create .

      - name: Install dependencies
        run: flutter pub get

      - name: Pin Android compileSdk to 36
        # Some transitive plugins (e.g. flutter_plugin_android_lifecycle) now
        # require compiling against API 36. Force compileSdk=36 across the app
        # AND every plugin subproject by appending an override to the root Gradle.
        run: |
          APP_KTS=android/app/build.gradle.kts
          APP_GROOVY=android/app/build.gradle
          ROOT_KTS=android/build.gradle.kts
          ROOT_GROOVY=android/build.gradle

          # App module
          [ -f "$APP_KTS" ] && sed -i 's/compileSdk = flutter.compileSdkVersion/compileSdk = 36/' "$APP_KTS"
          [ -f "$APP_GROOVY" ] && sed -i 's/compileSdk flutter.compileSdkVersion/compileSdk 36/' "$APP_GROOVY"

          # Force every subproject (incl. plugins) to compileSdk 36
          if [ -f "$ROOT_KTS" ]; then
            cat >> "$ROOT_KTS" <<'EOF'

subprojects {
    afterEvaluate {
        val androidExtension = extensions.findByName("android")
        if (androidExtension is com.android.build.gradle.BaseExtension) {
            androidExtension.compileSdkVersion(36)
        }
    }
}
EOF
            echo "Appended subprojects override to $ROOT_KTS"
          elif [ -f "$ROOT_GROOVY" ]; then
            cat >> "$ROOT_GROOVY" <<'EOF'

subprojects {
    afterEvaluate { proj ->
        if (proj.hasProperty('android')) {
            proj.android {
                compileSdkVersion 36
            }
        }
    }
}
EOF
            echo "Appended subprojects override to $ROOT_GROOVY"
          fi

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: streamly-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
