name: Flutter CI

# Run on pushes and PRs targeting main
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel older runs of the same branch/PR when a new commit arrives
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Generate platform folders
        run: flutter create .

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting (informational)
        continue-on-error: true
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze project source
        # Errors and warnings fail the build; info-level lints (e.g. deprecation
        # hints, prefer_const) are reported but non-fatal to stay SDK-flexible.
        run: flutter analyze --no-fatal-infos

      - name: Run tests (if any exist)
        run: |
          if ls test/*_test.dart >/dev/null 2>&1; then
            flutter test
          else
            echo "No test files found, skipping."
          fi

  build-android:
    name: Build Android APK
    needs: analyze
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Generate platform folders
        run: flutter create .

      - name: Install dependencies
        run: flutter pub get

      - name: Pin Android compileSdk to 36
        # Some transitive plugins (e.g. flutter_plugin_android_lifecycle) now
        # require compiling against API 36. The generated Gradle files default
        # lower, so bump compileSdk here after the platform folders are created.
        run: |
          KTS=android/app/build.gradle.kts
          GROOVY=android/app/build.gradle
          if [ -f "$KTS" ]; then
            sed -i 's/compileSdk = flutter.compileSdkVersion/compileSdk = 36/' "$KTS"
            sed -i 's/compileSdk = [0-9][0-9]*/compileSdk = 36/' "$KTS"
            echo "Patched (kts):"; grep -n "compileSdk" "$KTS" || true
          fi
          if [ -f "$GROOVY" ]; then
            sed -i 's/compileSdkVersion flutter.compileSdkVersion/compileSdkVersion 36/' "$GROOVY"
            sed -i 's/compileSdk flutter.compileSdkVersion/compileSdk 36/' "$GROOVY"
            sed -i 's/compileSdk [0-9][0-9]*/compileSdk 36/' "$GROOVY"
            sed -i 's/compileSdkVersion [0-9][0-9]*/compileSdkVersion 36/' "$GROOVY"
            echo "Patched (groovy):"; grep -n "compileSdk" "$GROOVY" || true
          fi

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: streamly-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
