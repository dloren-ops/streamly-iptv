name: streamly_iptv
description: A lightweight and fast IPTV player app (Live TV, Movies & Series)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State management
  provider: ^6.1.1
  
  # Video player
  media_kit: ^1.1.10+1
  media_kit_video: ^1.2.4
  media_kit_libs_video: ^1.0.4
  
  # Networking
  dio: ^5.4.0
  
  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Secure storage (for credentials)
  flutter_secure_storage: ^9.0.0
  
  # XML parsing (for EPG / XMLTV)
  xml: ^6.5.0
  
  # Image caching
  cached_network_image: ^3.3.1
  
  # UI utilities
  shimmer: ^3.0.0
  google_fonts: ^6.1.0
  
  # File picker (for loading M3U files)
  file_picker: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/
