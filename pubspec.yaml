name: iptv_app
description: A lightweight and fast IPTV player app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State management
  provider: ^6.1.1
  
  # Video player
  media_kit: ^1.1.10+1
  media_kit_video: ^1.2.4
  media_kit_libs_video: ^1.0.4
  
  # Networking
  dio: ^5.4.0
  
  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Image caching
  cached_network_image: ^3.3.1
  
  # UI utilities
  shimmer: ^3.0.0
  google_fonts: ^6.1.0
  flutter_staggered_animations: ^1.1.1
  
  # File picker (for loading M3U files)
  file_picker: ^6.1.1
  
  # Icons
  iconsax: ^0.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - assets/
